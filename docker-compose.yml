# Base de donnees de developpement, lancee automatiquement par `npm start`.
# Aucune installation de MySQL requise : `git clone` puis `npm start` suffit.
#
# Les identifiants viennent du script (scripts/start.mjs) :
#   - par defaut : user=app / password=app / db=elegante_amaro_db
#   - surchargeables : npm start -- --db-user moi --db-pass secret
#
# Port hote 3307 (et non 3306) pour ne pas entrer en conflit avec un
# MySQL/MariaDB deja installe sur la machine.
services:
  db:
    image: mariadb:11
    container_name: elegante-amaro-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-elegante_amaro_db}
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:-app}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  db_data:
